name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish (framework-dependent)
        run: dotnet publish src/MsBuildMcp -c Release -o publish/framework-dependent

      - name: Publish (self-contained)
        run: dotnet publish src/MsBuildMcp -c Release -r win-x64 --self-contained -o publish/self-contained

      - name: Create release archive
        run: |
          Compress-Archive -Path publish/framework-dependent/* -DestinationPath msbuild-mcp-${{ github.ref_name }}-win-x64.zip
          Compress-Archive -Path publish/self-contained/* -DestinationPath msbuild-mcp-${{ github.ref_name }}-win-x64-self-contained.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            msbuild-mcp-*.zip
